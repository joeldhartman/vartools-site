  - Installation: install.md
  - Getting Started: getting-started.md
  - Command Index: commands.md
  - CLI Reference:
    - Overview: cli/index.md
    - Light Curve Manipulation: cli/manipulation.md
    - Period Finding: cli/period-finding.md
    - Statistics: cli/statistics.md
    - Model Fitting: cli/model-fitting.md
    - Filtering & Detrending: cli/filtering.md
    - Light Curve Simulation: cli/simulation.md
    - Control Data Flow: cli/control-flow.md
    - Miscellaneous: cli/misc.md
    - Calling Python or R: cli/python-r.md
    - Input / Output Options: cli/options.md
    - Analytic Expressions: cli/expressions.md
    - Extension Commands: cli/extensions.md
  - Python API:
    - Overview: python/index.md
    - LightCurve: python/lightcurve.md
    - Method Chaining API: python/chaining.md
    - Pipeline: python/pipeline.md
    - Results: python/results.md
    - Commands:
      - Overview: python/commands/index.md
      - Light Curve Manipulation: python/commands/manipulation.md
      - Period Finding: python/commands/period-finding.md
      - Statistics: python/commands/statistics.md
      - Model Fitting: python/commands/model-fitting.md
      - Filtering & Detrending: python/commands/filtering.md
      - Light Curve Simulation: python/commands/simulation.md
      - Control Data Flow: python/commands/control-flow.md
      - Miscellaneous: python/commands/misc.md
      - Calling Python or R: python/commands/python-r.md
      - Extension Commands: python/commands/extensions.md
  - Examples:
    - Overview: examples/index.md
    - Polynomial detrending: examples/polynomial-detrending.md
    - Period finding: examples/period-finding.md
    - Transit injection: examples/transit-injection.md
    - Transit search & fit: examples/transit-search-and-fit.md
    - RR Lyrae recovery: examples/rrlyrae-recovery.md
